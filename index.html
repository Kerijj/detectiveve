<div id="game-container">
    <section id="scene-1" class="scene active">
        <h1>ШТРАБ РАССЛЕДОВАНИЯ: ДЕЛО №77-Б</h1>
        <div class="main-dashboard">
            <div class="dashboard-panel">
                <h2>📁 ДОСЬЕ</h2>
                <div id="dossier-list">
                    <button class="suspect-btn" onclick="openSuspect('alon')">Алон (Охрана)</button>
                    <button class="suspect-btn" onclick="openSuspect('wife')">Сара (Жена)</button>
                    <button class="suspect-btn" onclick="openSuspect('eli')">Эли (Мастер)</button>
                </div>
            </div>

            <div class="dashboard-panel">
                <h2>📍 КАРТА МЕСТ</h2>
                <div class="map-grid">
                    <button id="btn-office" class="map-square locked" onclick="openLoc('office')">Кабинет</button>
                    <button id="btn-workshop" class="map-square locked" onclick="openLoc('workshop')">Мастерская</button>
                    <button id="btn-airport" class="map-square locked" onclick="openLoc('airport')">Аэропорт</button>
                </div>
            </div>
        </div>

        <div id="status-bar">
            Улик собрано: <span id="clue-count">0</span> / 3
        </div>
        <button id="final-btn" class="hidden verdict-trigger" onclick="goToVerdict()">ВЫНЕСТИ ПРИГОВОР</button>
    </section>

    <div id="overlay" class="overlay hidden">
        <div class="overlay-content">
            <h3 id="overlay-title"></h3>
            <div id="overlay-body"></div>
            <div id="clue-action-zone"></div>
            <button class="close-btn" onclick="closeOverlay()">НАЗАД В ШТАБ</button>
        </div>
    </div>

    <section id="scene-2" class="scene">
        <h2>ЗАЛ СУДА: ВАШ ВЕРДИКТ</h2>
        <p>На основе собранных данных, кто совершил подмену?</p>
        <div class="final-choices">
            <button onclick="checkWinner('alon')">ОБВИНИТЬ АЛОНА</button>
            <button onclick="checkWinner('wife')">ОБВИНИТЬ САРУ</button>
            <button onclick="checkWinner('eli')">ОБВИНИТЬ ЭЛИ РАФАЭЛЯ</button>
        </div>
    </section>
</div>

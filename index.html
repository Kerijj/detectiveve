<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Dossier Investigation</title>
    <style>
        body { background: #e0d7c6; color: #2c241a; font-family: serif; padding: 40px; }
        .folder { max-width: 800px; margin: auto; border: 10px solid #c2b280; padding: 40px; background: #fdf5e6; position: relative; }
        .stamp { position: absolute; top: 20px; right: 20px; border: 3px solid #8b0000; color: #8b0000; transform: rotate(15deg); padding: 10px; font-weight: bold; }
        .loc-btn { display: inline-block; background: #c2b280; padding: 10px; margin: 5px; cursor: pointer; }
        .dossier-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .person { border: 1px solid #000; padding: 10px; font-size: 0.8em; background: #fff; }
    </style>
</head>
<body>
    <div class="folder">
        <div class="stamp">TOP SECRET</div>
        <h1>ДОСЬЕ: КРАЖА НА БИРЖЕ</h1>
        <p>Нажмите на локацию для сбора фактов:</p>
        <div class="loc-btn" onclick="act('office')">Офис Леви</div>
        <div class="loc-btn" onclick="act('security')">Охрана</div>
        <div class="loc-btn" onclick="act('workshop')">Мастерская</div>
        
        <div class="dossier-grid">
            <div id="p1" class="person"><b>Алон (Охрана)</b><p>?</p></div>
            <div id="p2" class="person"><b>Сара (Жена)</b><p>?</p></div>
            <div id="p3" class="person"><b>Эли (Мастер)</b><p>?</p></div>
        </div>
        <button onclick="check()" style="margin-top:20px;">ОБЪЯВИТЬ ВИНОВНОГО</button>
    </div>
<script>
    function act(id) {
        if(id === 'office') document.getElementById('p2').querySelector('p').innerText = "Знала код сейфа.";
        if(id === 'security') document.getElementById('p1').querySelector('p').innerText = "Выключил камеру.";
        if(id === 'workshop') document.getElementById('p3').querySelector('p').innerText = "Сделал алмазные пуговицы.";
    }
    function check() {
        const v = prompt("Имя преступника:");
        alert(v.toLowerCase() === 'эли' ? "Верно!" : "Ложь.");
    }
</script>
</body>
</html>

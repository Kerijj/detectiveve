<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Case #77-B: Noir Edition</title>
    <style>
        body { background: #0a0a0a; color: #c2b280; font-family: 'Courier New', monospace; padding: 20px; display: flex; justify-content: center; }
        #case-file { max-width: 700px; border: 2px solid #c2b280; padding: 30px; background: #111; box-shadow: 0 0 20px #000; }
        .hidden { display: none; }
        .clue-box { background: #1a1a1a; padding: 15px; margin: 10px 0; border-left: 4px solid #d4af37; }
        button { background: transparent; color: #c2b280; border: 1px solid #c2b280; padding: 10px 20px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #c2b280; color: #000; }
        button:disabled { opacity: 0.3; cursor: not-allowed; }
        .red { color: #a30000; }
    </style>
</head>
<body>
<div id="case-file">
    <h1>ДЕЛО №77-Б: ТЕНЬ ИЛЛЮЗИИ</h1>
    <div id="story">Рамат-Ган. Кража века. Сейф чист, но камни исчезли.</div>
    <hr>
    <div id="nav">
        <button id="btn-1" onclick="go('office')">1. Осмотреть кабинет</button>
        <button id="btn-2" class="hidden" onclick="go('workshop')">2. Поехать в мастерскую</button>
        <button id="btn-3" class="hidden" onclick="go('airport')">3. Перехватить в аэропорту</button>
    </div>
    <div id="suspects" class="hidden">
        <h3>ПОДОЗРЕВАЕМЫЕ:</h3>
        <div id="s-list"></div>
    </div>
    <button id="verdict-btn" class="hidden red" onclick="showVerdict()">ВЫНЕСТИ ПРИГОВОР</button>
</div>
<script>
    const data = {
        office: { text: "В кабинете найден механизм подмены и следы талька.", suspects: ["Сара (Жена)", "Эли (Мастер)"], next: "btn-2" },
        workshop: { text: "В мастерской Эли найдены фальшивые камни и список смен охраны.", suspects: ["Алон (Охрана)"], next: "btn-3" },
        airport: { text: "В аэропорту вы видите Эли. Его пуговицы светятся под УФ-лучом. Это алмазы!", suspects: [], next: "final" }
    };
    let foundSuspects = new Set();
    function go(id) {
        const item = data[id];
        document.getElementById('story').innerHTML += `<div class="clue-box">${item.text}</div>`;
        item.suspects.forEach(s => foundSuspects.add(s));
        renderSuspects();
        if(item.next === 'final') document.getElementById('verdict-btn').classList.remove('hidden');
        else document.getElementById(item.next).classList.remove('hidden');
        document.querySelector(`[onclick="go('${id}')"]`).disabled = true;
    }
    function renderSuspects() {
        document.getElementById('suspects').classList.remove('hidden');
        document.getElementById('s-list').innerHTML = Array.from(foundSuspects).map(s => `<li>${s}</li>`).join('');
    }
    function showVerdict() {
        let choice = prompt("Введите имя виновного: (Сара, Алон или Эли)");
        if(choice && choice.toLowerCase().includes("эли")) alert("ПОБЕДА! Камни были в пуговицах!");
        else alert("ПРОИГРЫШ. Преступник улетел.");
        location.reload();
    }
</script>
</body>
</html>

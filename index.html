<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Detective Board</title>
    <style>
        body { background: #121212; color: #eee; font-family: sans-serif; display: grid; grid-template-columns: 1fr 300px; gap: 20px; padding: 20px; }
        .main { border: 1px solid #333; padding: 20px; background: #1e1e1e; }
        .side { border: 1px solid #333; padding: 20px; background: #252525; }
        .card { background: #333; padding: 10px; margin-bottom: 10px; border-radius: 4px; cursor: pointer; }
        .card:hover { border: 1px solid gold; }
        .locked { opacity: 0.2; pointer-events: none; }
        .inventory-item { color: gold; font-size: 0.8em; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="main">
        <h2>МЕСТА ПРЕСТУПЛЕНИЯ</h2>
        <div class="card" onclick="reveal('office', this)">🏢 Кабинет господина Леви</div>
        <div id="loc-workshop" class="card locked" onclick="reveal('workshop', this)">🛠️ Мастерская Эли</div>
        <div id="loc-airport" class="card locked" onclick="reveal('airport', this)">✈️ Аэропорт (Гейт 12)</div>
        <div id="story-log" style="margin-top:20px; color:#aaa;"><i>Нажмите на объект для начала...</i></div>
    </div>
    <div class="side">
        <h3>УЛИКИ</h3>
        <div id="inventory"></div>
        <hr>
        <button id="final-btn" class="locked" onclick="finish()" style="width:100%; padding:10px; background: #8b0000; color: white; border: none;">ВЫНЕСТИ ВЕРДИКТ</button>
    </div>
<script>
    const steps = {
        office: { text: "Найдена подставка с секретом. Сара знала код, Эли был в гостях.", clue: "Механизм подмены", next: "loc-workshop" },
        workshop: { text: "Найдены чертежи пуговиц. Алон отключал камеры.", clue: "Чертежи пуговиц", next: "loc-airport" },
        airport: { text: "Вы видите Эли в пиджаке. Пуговицы — это алмазы!", clue: "Алмазные пуговицы", next: "final" }
    };
    function reveal(id, el) {
        const data = steps[id];
        document.getElementById('story-log').innerText = data.text;
        document.getElementById('inventory').innerHTML += `<div class="inventory-item">● ${data.clue}</div>`;
        el.style.borderColor = "green";
        if(data.next === 'final') document.getElementById('final-btn').classList.remove('locked');
        else document.getElementById(data.next).classList.remove('locked');
    }
    function finish() {
        const choice = prompt("Кто вор? (Сара, Алон или Эли)");
        alert(choice.toLowerCase() === 'эли' ? "ГЕНИАЛЬНО! Вы раскрыли дело." : "УВЫ! Вор ускользнул.");
        location.reload();
    }
</script>
</body>
</html>

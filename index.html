<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дело №77-Б: Паутина Лжи</title>
    <style>
        body { background: #070707; color: #b5a478; font-family: 'Courier New', Courier, monospace; padding: 20px; display: flex; justify-content: center; }
        #case-file { max-width: 900px; width: 100%; border: 1px solid #444; padding: 40px; background: #0f0f0f; box-shadow: 0 0 40px #000; position: relative; }
        .case-header { text-align: center; border-bottom: 2px double #b5a478; margin-bottom: 20px; padding-bottom: 10px; }
        .hidden { display: none; }
        .clue-box { background: #151515; padding: 15px; margin: 12px 0; border-left: 5px solid #635a41; border-right: 1px solid #333; animation: fadeIn 0.6s; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        button { background: #1a1a1a; color: #b5a478; border: 1px solid #444; padding: 12px; cursor: pointer; transition: 0.3s; text-align: left; font-size: 0.85em; }
        button:hover:not(:disabled) { background: #b5a478; color: #000; border-color: #fff; }
        button:disabled { color: #333; border-color: #222; cursor: default; }

        .red-btn { border-color: #631212; color: #a30000; font-weight: bold; }
        .red-btn:hover { background: #631212 !important; color: #fff !important; }

        #sidebar { margin-top: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; font-size: 0.85em; border-top: 1px solid #333; padding-top: 20px; }
        .status-block { border: 1px solid #222; padding: 10px; background: #0a0a0a; }
        .gold { color: #d4af37; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="case-file">
    <div class="case-header">
        <p style="font-size: 0.7em; letter-spacing: 5px;">CONFIDENTIAL / EYES ONLY</p>
        <h1>ПРОТОКОЛ РАССЛЕДОВАНИЯ №77-Б</h1>
    </div>

    <div id="story-log">
        <p><strong>МЕСТО:</strong> Алмазная Биржа, Рамат-Ган.</p>
        <p>Пропали 15 необработанных алмазов. Сейф открыт "чисто". Камеры зафиксировали помехи. На месте найдено: пустой стакан и запах дешевого табака.</p>
    </div>

    <div class="controls" id="nav-buttons">
        <button id="btn-office" onclick="action('office')">📍 Осмотреть сейф и стол</button>
        <button id="btn-cafe" class="hidden" onclick="action('cafe')">☕ Кафе "Биржа" (Опрос официантов)</button>
        <button id="btn-wife" class="hidden" onclick="action('wife')">👤 Допрос Сары Леви</button>
        <button id="btn-security" class="hidden" onclick="action('security')">🛡️ Пост охраны (Логи сервера)</button>
        <button id="btn-warehouse" class="hidden" onclick="action('warehouse')">📦 Логистический склад</button>
        <button id="btn-antique" class="hidden" onclick="action('antique')">🕯️ Антикварная лавка</button>
        <button id="btn-workshop" class="hidden" onclick="action('workshop')">⚙️ Мастерская Эли Рафаэля</button>
        <button id="btn-airport" class="hidden" onclick="action('airport')">✈️ Аэропорт: Финальный перехват</button>
    </div>

    <div id="sidebar">
        <div class="status-block">
            <p class="gold"><strong>УЛИКИ В ПАПКЕ:</strong></p>
            <ul id="clue-list" style="padding-left: 20px;"><li>нет данных</li></ul>
        </div>
        <div class="status-block">
            <p class="gold"><strong>ФИГУРАНТЫ (ДОСЬЕ):</strong></p>
            <div id="suspect-list"><i>пусто</i></div>
        </div>
    </div>

    <button id="verdict-btn" class="hidden red-btn" onclick="openVerdict()" style="width: 100%; margin-top: 20px; text-align: center;">ВЫНЕСТИ ОКОНЧАТЕЛЬНОЕ ОБВИНЕНИЕ</button>
</div>

<script>
    const db = {
        office: {
            text: "В сейфе нет следов взлома. На дне — микроскопический белый порошок (тальк). На подставке для воды найден отпечаток пальца в перчатке. Кто-то явно имитировал небрежность.",
            clues: ["Белый порошок (тальк)", "След перчатки"],
            suspects: ["Сара (Жена)", "Эли (Мастер)"],
            unlock: ["btn-cafe", "btn-wife"]
        },
        cafe: {
            text: "Официант вспомнил: за час до кражи курьер Марк передал пакет охраннику Алону. Алон выглядел напуганным. В чеке из кафе — пометка 'за счет заведения для VIP-клиента'.",
            clues: ["Пакет для охраны", "VIP-привилегия"],
            suspects: ["Алон (Охрана)", "Марк (Курьер)"],
            unlock: ["btn-security"]
        },
        wife: {
            text: "Сара утверждает, что муж был банкротом. Она подсовывает вам письмо: Алон якобы угрожал ее мужу. Письмо пахнет тем же табаком, что был на месте кражи. Слишком очевидно?",
            clues: ["Письмо с угрозами (Алон?)", "Запах табака"],
            suspects: [],
            unlock: ["btn-antique"]
        },
        security: {
            text: "Алон клянется, что в пакете был сэндвич. Но логи показывают: камеры отключил не он, а удаленный доступ из 'Ювелирной лавки Ицхака'. Алон просто закрыл на это глаза.",
            clues: ["Удаленный взлом камер", "Сговор Алона"],
            suspects: ["Ицхак (Оценщик)"],
            unlock: ["btn-warehouse"]
        },
        warehouse: {
            text: "На складе вы находите пустую коробку из-под серого лака и партию дешевых пуговиц. Марк (курьер) сознается: он возил заказы между Эли и Ицхаком, но не знал, что внутри.",
            clues: ["Партия пуговиц", "Серый лак"],
            suspects: [],
            unlock: ["btn-workshop"]
        },
        antique: {
            text: "Старый антиквар Ицхак нервничает. Вы находите у него поддельный ключ от сейфа Леви. Он говорит, что Сара заказала его месяц назад. Но ключ не подходит к замку — это пустышка для отвода глаз.",
            clues: ["Ложный ключ (Сара?)", "Показания Ицхака"],
            suspects: [],
            unlock: ["btn-workshop"]
        },
        workshop: {
            text: "В мастерской Эли вы находите самое важное: химический состав для снятия матового покрытия. Рядом — фото пиджака Эли с пометкой '15 пуговиц'. На столе рассыпан тот же тальк, что в сейфе.",
            clues: ["Растворитель лака", "План пиджака"],
            suspects: [],
            unlock: ["btn-airport"]
        },
        airport: {
            text: "Аэропорт. Все фигуранты здесь. Эли пытается пройти контроль. Его пиджак кажется обычным, но пуговицы под УФ-светом меняют цвет. Они закрашены серым лаком, чтобы скрыть блеск алмазов.",
            clues: ["Алмазные пуговицы"],
            unlock: ["final"]
        }
    };

    let state = { clues: new Set(), suspects: new Set(), visited: new Set() };

    function action(id) {
        const node = db[id];
        const log = document.getElementById('story-log');
        const box = document.createElement('div');
        box.className = 'clue-box';
        box.innerHTML = `<strong>ОТЧЕТ (${id.toUpperCase()}):</strong> ${node.text}`;
        log.appendChild(box);

        node.clues.forEach(c => state.clues.add(c));
        node.suspects.forEach(s => state.suspects.add(s));

        updateSidebar();

        if (node.unlock) {
            if (node.unlock.includes("final")) {
                document.getElementById('verdict-btn').classList.remove('hidden');
            } else {
                node.unlock.forEach(b => document.getElementById(b).classList.remove('hidden'));
            }
        }

        document.getElementById(`btn-${id}`).disabled = true;
        window.scrollTo(0, document.body.scrollHeight);
    }

    function updateSidebar() {
        const cList = document.getElementById('clue-list');
        cList.innerHTML = Array.from(state.clues).map(c => `<li>${c}</li>`).join('');

        const sList = document.getElementById('suspect-list');
        sList.innerHTML = Array.from(state.suspects).map(s => `• ${s}`).join('<br>');
    }

    function openVerdict() {
        const suspectList = Array.from(state.suspects).join(", ");
        const final = prompt(`КТО ГЛАВНЫЙ ОРГАНИЗАТОР? \nФигуранты: ${suspectList}\n\n(Введите имя)`);
        
        if (!final) return;

        if (final.toLowerCase().includes("эли")) {
            alert("ПОБЕДА! \n\nЭли Рафаэль был мозгом операции. Он использовал Ицхака и Сару как отвлекающие цели, подбросив тальк и письма. Камни были закрашены лаком и пришиты как пуговицы. Блестяще!");
        } else {
            alert(`КРАХ... \n\nВы обвинили ${final}. Пока шли разбирательства, Эли Рафаэль прошел контроль. Камни на его пиджаке улетели вместе с ним. Вы уволены.`);
        }
        location.reload();
    }
</script>

</body>
</html>
